<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotkey Chain 设置</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="assets/bootstrap-icons.css" />
    <!-- Animate.css -->
    <link rel="stylesheet" href="assets/animate.min.css" />
    <!-- Custom styles -->
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="main-container">
        <!-- Header -->
        <header class="app-header p-4 text-center">
          <h1 class="h2 mb-2" data-i18n="appTitle">🔗 Hotkey Chain 设置</h1>
          <p class="mb-0 opacity-75" data-i18n="appSubtitle">扩展设置 · 动作链管理</p>
        </header>

        <!-- 主界面 -->
        <div class="main-content p-4" id="main-view">
          <!-- 工具栏 -->
          <div class="toolbar mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h3 class="h4 mb-1" data-i18n="toolbar_title">动作链管理</h3>
                <p class="text-muted mb-0" data-i18n="toolbar_subtitle">创建和管理您的快捷操作序列</p>
              </div>
              <div class="toolbar-actions d-flex align-items-center gap-2">
                <div class="d-flex align-items-center me-2">
                  <label for="localeSelect" class="me-2 small text-muted" data-i18n="settings_language">界面语言</label>
                  <select id="localeSelect" class="form-select form-select-sm" style="width: auto; min-width: 160px">
                    <option value="auto" data-i18n="language_auto">跟随浏览器</option>
                    <option value="en">English</option>
                    <option value="zh_CN">简体中文</option>
                    <option value="zh_TW">繁體中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt_BR">Português (Brasil)</option>
                    <option value="ru">Русский</option>
                    <option value="it">Italiano</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                    <option value="id">Bahasa Indonesia</option>
                    <option value="tr">Türkçe</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="th">ไทย</option>
                    <option value="pl">Polski</option>
                  </select>
                </div>
                <button id="shortcutsBtn" class="btn btn-outline-secondary" data-i18n-title="toolbar_shortcuts" title="快捷键设置"><i class="bi bi-keyboard"></i></button>
                <button id="exportBtn" class="btn btn-outline-secondary"><i class="bi bi-download me-1"></i><span data-i18n="toolbar_export">导出</span></button>
                <button id="importBtn" class="btn btn-outline-secondary"><i class="bi bi-upload me-1"></i><span data-i18n="toolbar_import">导入</span></button>
                <input type="file" id="importFileInput" accept=".json,application/json" hidden />
                <button id="restoreDefaultsBtn" class="btn btn-outline-secondary" data-i18n-title="toolbar_restoreDefaults" title="恢复默认动作链"><i class="bi bi-arrow-counterclockwise me-1"></i><span data-i18n="toolbar_restoreDefaults">恢复默认</span></button>
                <div class="btn-group">
                  <button id="templateBtn" class="btn btn-outline-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-stars me-2"></i><span data-i18n="toolbar_templates">从模板新建</span>
                  </button>
                  <ul class="dropdown-menu" id="templateMenu">
                    <!-- Populated by JavaScript -->
                  </ul>
                </div>
                <button id="addChainBtn" class="btn btn-primary"><i class="bi bi-plus-lg me-2"></i><span data-i18n="toolbar_add">新建动作链</span></button>
              </div>
            </div>
          </div>

          <!-- 动作链网格 -->
          <div class="chains-grid" id="chains-container">
            <!-- Populated by JavaScript -->
          </div>

          <!-- 帮助信息 -->
          <div class="help-section mt-5">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">
                  <button class="btn btn-link text-decoration-none p-0" type="button" data-bs-toggle="collapse" data-bs-target="#helpCollapse">
                    <i class="bi bi-question-circle me-2"></i><span data-i18n="help_title">可用动作说明</span>
                    <i class="bi bi-chevron-down ms-2"></i>
                  </button>
                </h5>
              </div>
              <div id="helpCollapse" class="collapse">
                <div class="card-body">
                  <div class="actions-help">
                    <!-- Populated by JavaScript -->
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 编辑界面 -->
        <div class="edit-content" id="edit-view" style="display: none">
          <!-- 编辑头部 -->
          <div class="edit-header p-4 border-bottom">
            <div class="d-flex align-items-center justify-content-between">
              <div class="d-flex align-items-center">
                <button id="backBtn" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left me-2"></i><span data-i18n="edit_back">返回</span></button>
                <div>
                  <h3 class="h4 mb-0" id="editChainTitle" data-i18n="edit_title">编辑动作链</h3>
                  <p class="text-muted mb-0" data-i18n="edit_subtitle">配置动作序列和执行参数</p>
                </div>
              </div>
              <div class="edit-actions d-flex gap-2">
                <button id="exportChainBtn" class="btn btn-outline-secondary"><i class="bi bi-download me-2"></i><span data-i18n="edit_exportChain">导出此链</span></button>
                <button id="testChainBtn" class="btn btn-outline-primary"><i class="bi bi-play me-2"></i><span data-i18n="edit_test">测试执行</span></button>
              </div>
            </div>
          </div>

          <!-- 编辑内容 -->
          <div class="edit-body p-4">
            <div class="row">
              <!-- 左侧：基本信息 -->
              <div class="col-md-4">
                <div class="chain-info-panel">
                  <h5 class="mb-3" data-i18n="info_basic">基本信息</h5>
                  <div class="mb-3">
                    <label class="form-label" data-i18n="info_name">动作链名称</label>
                    <input type="text" class="form-control" id="chainNameInput" data-i18n-placeholder="info_name_placeholder" placeholder="输入动作链名称" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label" data-i18n="info_desc">描述</label>
                    <textarea class="form-control" id="chainDescInput" rows="3" data-i18n-placeholder="info_desc_placeholder" placeholder="可选：描述这个动作链的用途"></textarea>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="setAsDefaultCheck" />
                    <label class="form-check-label" for="setAsDefaultCheck" data-i18n="info_default"> 设为默认动作链 </label>
                  </div>

                  <hr />
                  <h6 class="mb-3" data-i18n="info_triggers">自动触发</h6>
                  <div class="mb-3">
                    <label class="form-label" data-i18n="info_schedule">定时运行（分钟，0 = 关闭）</label>
                    <input type="number" class="form-control" id="chainScheduleInput" min="0" max="10080" step="1" value="0" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label" data-i18n="info_autoRun">页面加载时自动运行（网址规则）</label>
                    <textarea
                      class="form-control"
                      id="chainAutoRunInput"
                      rows="2"
                      data-i18n-placeholder="info_autoRun_placeholder"
                      placeholder="如 *://github.com/*，多个规则用逗号或换行分隔"
                    ></textarea>
                  </div>
                </div>
              </div>

              <!-- 右侧：动作配置 -->
              <div class="col-md-8">
                <div class="actions-panel">
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" data-i18n="actions_title">动作序列</h5>
                    <button id="addActionBtn" class="btn btn-outline-primary btn-sm"><i class="bi bi-plus me-1"></i><span data-i18n="actions_add">添加动作</span></button>
                  </div>
                  <div class="actions-list" id="chainEditConfig">
                    <!-- Populated by JavaScript -->
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="assets/Sortable.min.js"></script>
    <script src="assets/bootstrap.bundle.min.js"></script>
    <script src="options.js"></script>
  </body>
</html>
